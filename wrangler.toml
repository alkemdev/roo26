# Wrangler config for the Cloudflare Pages project.
#
# Deploys happen via Cloudflare's native Git integration (CF builds on every
# push to main), so no GitHub Actions deploy is needed. This file is read by
# the CF build system for output dir + compatibility date, and by
# `wrangler pages dev` locally. Infrastructure (KV namespace, custom domain,
# DNS, analytics) is managed in OpenTofu under infra/.
name = "roo26"
pages_build_output_dir = "./dist"
compatibility_date = "2026-06-01"

# Crew location sharing (optional). The namespace + binding are provisioned by
# `infra/` when enable_crew = true and inherited by every deployment, so this
# stays commented. Uncomment + fill the id only if you manage bindings here
# instead of in OpenTofu.
# [[kv_namespaces]]
# binding = "ROO_KV"
# id = "<roo26-crew namespace id>"
