version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    groups:
      astro:
        patterns: ["astro", "@astrojs/*"]
      app-deps:
        patterns: ["leaflet", "@dicebear/*", "qrcode"]

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
