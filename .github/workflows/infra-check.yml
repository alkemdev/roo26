name: Infra check

# Format + validate the OpenTofu config. No Cloudflare credentials needed:
# `validate` only resolves the schema, it never touches the API.

on:
  push:
    branches: [main]
    paths: ["infra/**"]
  pull_request:
    paths: ["infra/**"]

jobs:
  tofu:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra
    steps:
      - uses: actions/checkout@v6
      - uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: 1.9.0
      - run: tofu fmt -check -recursive
      - run: tofu init -backend=false
      - run: tofu validate
