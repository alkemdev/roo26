name: Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# One in-flight deploy per ref; newer pushes cancel older runs.
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  deployments: write
  pull-requests: write

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    # Skip on PRs from forks, which can't see the deploy secrets.
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # Project name + output dir come from wrangler.toml. On a PR this
          # deploys to a preview URL; on main it's the production deploy.
          command: pages deploy --branch=${{ github.head_ref || github.ref_name }}
